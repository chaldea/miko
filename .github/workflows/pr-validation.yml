name: PR Validation

# Validate that pull requests targeting main compile successfully.
# Configure this workflow as a required status check in branch protection
# so failures block merging.

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    # macos-latest can target net10.0, net10.0-android and net10.0-ios at once,
    # so the whole solution (including the Android/iOS implementation libraries)
    # is validated in a single job.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Install mobile workloads
        run: dotnet workload install android ios

      # Build the whole solution. miko.slnx includes the Android/iOS libraries,
      # which the macOS runner can compile thanks to the workloads above.
      - name: Build solution (Release)
        run: dotnet build miko.slnx -c Release

      - name: Build and run tests
        run: dotnet test tests/Miko.Tests/Miko.Tests.csproj -c Release
